<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- subtle grid -->
  <line x1="0"   y1="260" x2="1024" y2="260" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <line x1="0"   y1="512" x2="1024" y2="512" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <line x1="0"   y1="764" x2="1024" y2="764" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <line x1="260" y1="80"  x2="260"  y2="944" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <line x1="512" y1="80"  x2="512"  y2="944" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <line x1="764" y1="80"  x2="764"  y2="944" stroke="#ffffff" stroke-width="1" opacity="0.06"/>

  <!-- axis highlights -->
  <line x1="80" y1="764" x2="944" y2="764" stroke="#42FA80" stroke-width="1.5" opacity="0.2"/>
  <line x1="80" y1="260" x2="944" y2="260" stroke="#42FA80" stroke-width="1.5" opacity="0.1"/>

  <!-- axis labels -->
  <text x="52" y="272" font-family="system-ui,monospace" font-size="28" fill="#42FA80" opacity="0.3" text-anchor="end">1</text>
  <text x="52" y="524" font-family="system-ui,monospace" font-size="28" fill="#42FA80" opacity="0.3" text-anchor="end">½</text>
  <text x="52" y="776" font-family="system-ui,monospace" font-size="28" fill="#42FA80" opacity="0.3" text-anchor="end">0</text>

  <!-- secondary curves -->
  <path d="M 128 764 C 220 764, 280 360, 370 490 C 440 580, 490 390, 555 340 C 625 290, 695 500, 896 500"
        fill="none" stroke="#5B8FFF" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <path d="M 128 764 C 360 764, 590 400, 896 330"
        fill="none" stroke="#FFBE3B" stroke-width="2.5" stroke-linecap="round" opacity="0.16"/>

  <!-- tangent arms -->
  <line x1="128" y1="764" x2="390" y2="764"
        stroke="#42FA80" stroke-width="2.5" stroke-dasharray="12,10" stroke-linecap="round" opacity="0.45"/>
  <line x1="896" y1="260" x2="634" y2="260"
        stroke="#42FA80" stroke-width="2.5" stroke-dasharray="12,10" stroke-linecap="round" opacity="0.45"/>

  <!-- tangent handle dots -->
  <circle cx="390" cy="764" r="9" fill="#000000" fill-opacity="0.3" stroke="#42FA80" stroke-width="2.5" opacity="0.65"/>
  <circle cx="634" cy="260" r="9" fill="#000000" fill-opacity="0.3" stroke="#42FA80" stroke-width="2.5" opacity="0.65"/>

  <!-- main S-curve -->
  <path d="M 128 764 C 390 764, 634 260, 896 260"
        fill="none" stroke="#42FA80" stroke-width="14" stroke-linecap="round"/>

  <!-- past onion skin — solid, fading in -->
  <circle cx="207" cy="758" r="9"  fill="#42FA80" opacity="0.14"/>
  <circle cx="287" cy="742" r="11" fill="#42FA80" opacity="0.20"/>
  <circle cx="364" cy="706" r="14" fill="#42FA80" opacity="0.28"/>
  <circle cx="439" cy="628" r="17" fill="#42FA80" opacity="0.40"/>

  <!-- current frame -->
  <circle cx="512" cy="512" r="46" fill="none" stroke="#42FA80" stroke-width="2.5" opacity="0.25"/>
  <circle cx="512" cy="512" r="32" fill="none" stroke="#42FA80" stroke-width="2"   opacity="0.45"/>
  <circle cx="512" cy="512" r="22" fill="#42FA80"/>

  <!-- future onion skin — outlined, fading out -->
  <circle cx="585" cy="396" r="17" fill="none" stroke="#42FA80" stroke-width="2.5" opacity="0.40"/>
  <circle cx="658" cy="314" r="14" fill="none" stroke="#42FA80" stroke-width="2"   opacity="0.28"/>
  <circle cx="727" cy="274" r="11" fill="none" stroke="#42FA80" stroke-width="2"   opacity="0.20"/>
  <circle cx="797" cy="261" r="9"  fill="none" stroke="#42FA80" stroke-width="1.5" opacity="0.14"/>

  <!-- keyframe anchor diamonds -->
  <rect x="114" y="750" width="28" height="28" rx="5" transform="rotate(45 128 764)"
        fill="#000000" fill-opacity="0.3" stroke="#42FA80" stroke-width="3"/>
  <rect x="882" y="246" width="28" height="28" rx="5" transform="rotate(45 896 260)"
        fill="#000000" fill-opacity="0.3" stroke="#42FA80" stroke-width="3"/>

</svg>
